<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mothership — ライブラリ</title>
<style>
  :root{--bg:#1b1b19;--panel:#23231f;--ink:#e8e5de;--faint:#8a8a80;--line:#33332f;--gold:#a89060;--live:#5a9c6a}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);font-family:'SF Mono','Space Mono',ui-monospace,monospace;font-size:13px}
  header{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px}
  .logo{font-weight:700;letter-spacing:.26em;font-size:13px}
  .logo svg{vertical-align:-3px;margin-right:8px}
  .logo span{color:var(--gold)}
  .nav{margin-left:auto;display:flex;gap:8px}
  a.btn,button{font-family:inherit;font-size:11px;letter-spacing:.1em;border-radius:6px;padding:8px 13px;cursor:pointer;
    border:1px solid var(--line);background:var(--panel);color:var(--ink);text-decoration:none;transition:.15s;white-space:nowrap}
  a.btn:hover,button:hover{border-color:var(--gold);color:#fff}
  a.btn.on{border-color:var(--gold);color:var(--gold)}
  .segnav{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .segnav a{font-family:inherit;font-size:11px;letter-spacing:.04em;color:var(--faint);text-decoration:none;padding:8px 14px;border-right:1px solid var(--line);cursor:pointer;white-space:nowrap;transition:background .15s,color .15s}
  .segnav a:last-child{border-right:none}
  .segnav a:hover{color:var(--ink)}
  .segnav a.on{background:var(--gold);color:#1a1407;font-weight:700}
  button.gold{background:var(--gold);color:#1a1a18;border-color:var(--gold);font-weight:700}
  .card .del{position:absolute;top:18px;right:18px;z-index:3;width:26px;height:26px;padding:0;font-size:12px;line-height:1;border-radius:7px;color:#e8e5de;background:rgba(20,18,16,.6);border:1px solid var(--line);opacity:.92;transition:.15s;backdrop-filter:blur(4px)}
  .card{position:relative}
  .card .del:hover{background:#a5564e;border-color:#a5564e;color:#fff;opacity:1}
  button.gold:hover{filter:brightness(1.08);color:#1a1a18}
  .wrap{padding:22px;max-width:1180px;margin:0 auto}
  .sub{color:var(--faint);font-size:11px;letter-spacing:.06em;margin:0 0 18px;line-height:1.6}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(232px,1fr));gap:18px}
  .card{border:1px solid var(--line);border-radius:10px;background:var(--panel);padding:12px;display:flex;flex-direction:column;gap:10px}
  .thumb{width:100%;height:158px;border-radius:7px;overflow:hidden;background:#ecebe6;border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;position:relative}
  .thumb .err{color:#a5564e;font-size:10px;padding:20px}
  .meta{display:flex;flex-direction:column;gap:2px}
  .meta .name{font-size:13px;font-weight:700;letter-spacing:.02em}
  .meta .file{color:var(--faint);font-size:9.5px;letter-spacing:.04em;word-break:break-all}
  .row{display:flex;gap:8px}
  .row button{flex:1;font-size:10px;padding:8px 6px}
  .empty{color:var(--faint);padding:40px;text-align:center;grid-column:1/-1}
  #toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#2a2a24;border:1px solid var(--gold);
    color:#fff;padding:10px 16px;border-radius:8px;font-size:12px;opacity:0;transition:.2s;pointer-events:none}
  #toast.on{opacity:1}
</style>
</head>
<body>
  <header>
    <div class="logo"><svg width="22" height="15" viewBox="2 9 46 32" fill="none" stroke="#a89060" stroke-width="4.2" stroke-linecap="round"><path d="M25 25 C25 11 4 11 4 25 C4 39 25 39 25 25 C25 11 46 11 46 25 C46 39 25 39 25 25 Z"/></svg>M O T H E R S H I P<span data-i18n="brand"> · ライブラリ</span></div>
    <div class="nav"><span class="segnav"><a href="/chat.html">💬 チャット</a><a href="/studio.html">✎ 編集</a><a class="on" href="/library.html">▤ ライブラリ</a></span><button class="btn" id="langbtn">EN</button></div>
  </header>
  <div class="wrap">
    <p class="sub" data-i18n="sub">詰め済みパターンの蓄積。「Figmaに送る」で原本(mothership.json)へ流し込み→接続中のプラグインがネイティブ生成。「編集」で開いて調整。</p>
    <div class="grid" id="grid"><div class="empty" data-i18n="loading">読み込み中…</div></div>
  </div>
  <div id="toast"></div>
<script>
/* ===== Mothership レンダラー（studio.htmlと同一・サムネ用） ===== */
function rv(v,t){ if(typeof v==='string'&&v[0]==='@'){let p=v.slice(1).split('.'),c=t;for(const k of p){if(c==null)return v;c=c[k];}return c==null?v:c;} return v; }
function hexA(hex,a){hex=String(hex).replace('#','');if(hex.length===3)hex=hex.split('').map(c=>c+c).join('');const n=parseInt(hex,16)||0;return 'rgba('+((n>>16)&255)+','+((n>>8)&255)+','+(n&255)+','+(a==null?1:a)+')';}
function cssFill(fill,t){ fill=rv(fill,t); if(fill==null)return null; if(typeof fill==='string')return fill;
  let stops=fill.stops; if(!stops&&Array.isArray(fill.gradient)){const cols=fill.gradient.map(c=>rv(c,t));stops=cols.map((c,i)=>({color:c,at:cols.length<2?0:i/(cols.length-1)}));}
  stops=(stops||[]).map(s=>rv(s.color,t)+' '+Math.round((s.at==null?0:s.at)*100)+'%');
  if(fill.type==='radial')return 'radial-gradient(circle at 50% 35%,'+stops.join(',')+')';
  return 'linear-gradient('+(90+(fill.angle==null?90:fill.angle))+'deg,'+stops.join(',')+')';
}
function el(node,t){
  const type=node.type||'frame', isImg=type==='image';
  const d=document.createElement(isImg?'img':'div'); const s=d.style; s.boxSizing='border-box';
  if(node.w!=null)s.width=rv(node.w,t)+'px';
  if(node.h!=null)s.height=rv(node.h,t)+'px';
  if(type==='ellipse')s.borderRadius='50%'; else if(node.radius!=null)s.borderRadius=rv(node.radius,t)+'px';
  if(node.opacity!=null)s.opacity=node.opacity;
  if(node.stroke)s.border=(node.strokeWidth||1)+'px solid '+cssFill(node.stroke,t);
  if(node.shadow){const sh=Array.isArray(node.shadow)?node.shadow[0]:node.shadow; s.boxShadow=(sh.inner?'inset ':'')+(sh.x||0)+'px '+(sh.y==null?8:sh.y)+'px '+(sh.blur==null?16:sh.blur)+'px '+(sh.spread||0)+'px '+hexA(sh.color||'#000',sh.opacity==null?0.18:sh.opacity);}
  if(type==='text'){
    const f=node.font||{}; s.whiteSpace='pre-wrap';
    s.fontFamily="'"+(f.family||'Inter')+"','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif";
    const sz=rv(f.size,t); if(sz)s.fontSize=sz+'px';
    if(f.weight)s.fontWeight=f.weight;
    const lh=rv(f.lineHeight,t); if(lh)s.lineHeight=lh+'px';
    if(f.letterSpacing!=null)s.letterSpacing=rv(f.letterSpacing,t)+'px';
    s.color=cssFill(node.fill,t)||'#1a1a18';
    if(node.align)s.textAlign=node.align;
    d.textContent=rv(node.text,t)||'';
  } else if(isImg){
    d.src=node.src||''; s.objectFit=node.scaleMode==='FIT'?'contain':'cover';
  } else if(type==='svg'){
    d.innerHTML=String(node.svg||''); var _sv=d.querySelector('svg'); if(_sv){_sv.setAttribute('width','100%');_sv.setAttribute('height','100%');_sv.style.display='block';}
  } else {
    const fillv=node.fill!=null?node.fill:(type==='rect'||type==='ellipse'?'#cccccc':null);
    if(fillv!=null){const c=cssFill(fillv,t); if(c&&c.indexOf('gradient')>=0)s.backgroundImage=c; else if(c)s.background=c;}
    const L=node.layout;
    if(L){
      s.display='flex'; s.flexDirection=L.mode==='horizontal'?'row':'column';
      if(L.gap!=null)s.gap=rv(L.gap,t)+'px';
      const pad=rv(L.padding,t);
      if(pad!=null){if(typeof pad==='number')s.padding=pad+'px';else s.padding=(pad.top||0)+'px '+(pad.right||0)+'px '+(pad.bottom||0)+'px '+(pad.left||0)+'px';}
      const al=L.align||'start'; s.alignItems=al==='center'?'center':al==='end'?'flex-end':'flex-start';
      const ju=L.justify||'start'; s.justifyContent=ju==='center'?'center':ju==='end'?'flex-end':ju==='between'?'space-between':'flex-start';
    } else { s.position='relative'; }
    (node.children||[]).forEach(ch=>{
      const cn=el(ch,t);
      if(L){ if(ch.stretch)cn.style.alignSelf='stretch'; if(ch.grow)cn.style.flexGrow='1'; }
      else if(ch.x!=null||ch.y!=null){ cn.style.position='absolute'; if(ch.x!=null)cn.style.left=rv(ch.x,t)+'px'; if(ch.y!=null)cn.style.top=rv(ch.y,t)+'px'; }
      d.appendChild(cn);
    });
  }
  return d;
}
/* サムネ生成: docを実寸でオフスクリーン計測→カード幅にscaleして埋め込む */
function renderThumb(holder, doc){
  var t=doc.tokens||{};
  var node=el(doc.root||doc, t);
  node.style.fontFamily="'"+(doc.font||'Inter')+"','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif";
  // 計測
  var probe=document.createElement('div'); probe.style.cssText='position:absolute;left:-99999px;top:0;visibility:hidden';
  probe.appendChild(node); document.body.appendChild(probe);
  var w=(doc.root&&doc.root.w)||node.offsetWidth||800;
  var h=(doc.root&&doc.root.h)||node.offsetHeight||600;
  document.body.removeChild(probe);
  var boxW=holder.clientWidth||210, boxH=holder.clientHeight||158;
  var scale=Math.min(boxW/w, boxH/h); // contain（枠内に全体を収める）
  var offX=(boxW-w*scale)/2, offY=(boxH-h*scale)/2; // 中央配置
  node.style.position='absolute'; node.style.left=Math.round(offX)+'px'; node.style.top=Math.round(offY)+'px';
  node.style.width=w+'px'; node.style.height=h+'px';
  node.style.transformOrigin='top left'; node.style.transform='scale('+scale+')';
  holder.innerHTML=''; holder.appendChild(node);
}

/* ===== i18n (EN / 日本語) ===== */
var I18N={
  ja:{ brand:' · ライブラリ', tune:'✎ 詰める', sub:'詰め済みパターンの蓄積。「Figmaに送る」で原本(mothership.json)へ流し込み→接続中のプラグインがネイティブ生成。「編集」で開いて調整。', loading:'読み込み中…', send:'Figmaに送る', tunecard:'編集', sent:'Figmaに送りました（接続中のプラグインに反映）', noconn:'relayに接続できません。<br>cd mothership &amp;&amp; node relay.js で起動してください。', empty:'まだパターンがありません。studioで詰めて library/ に保存してね。', pvfail:'preview失敗', delconfirm:'を削除しますか？', deleted:'削除しました', delfail:'削除に失敗', langlabel:'EN' },
  en:{ brand:' · Library', tune:'✎ Tune', sub:'Your saved patterns. "Send to Figma" pushes it into the source (mothership.json) → the connected plugin builds it natively. "Tune" opens it in studio.', loading:'Loading…', send:'Send to Figma', tunecard:'Edit', sent:'Sent to Figma (applied in the connected plugin)', noconn:'Cannot reach relay.<br>Run: cd mothership &amp;&amp; node relay.js', empty:'No patterns yet. Tune one in studio and save to library/.', pvfail:'preview failed', delconfirm:' — delete this pattern?', deleted:'Deleted', delfail:'Delete failed', langlabel:'日本語' }
};
var lang=(function(){ try{return localStorage.getItem('ms_lang')||'ja';}catch(e){return 'ja';} })();
function tr(k){ return (I18N[lang]||I18N.ja)[k]; }
function applyLang(){
  document.querySelectorAll('[data-i18n]').forEach(function(e){ var v=tr(e.getAttribute('data-i18n')); if(v!=null)e.textContent=v; });
  document.getElementById('langbtn').textContent=tr('langlabel');
  document.documentElement.lang=lang;
}
document.getElementById('langbtn').onclick=function(){ lang=(lang==='ja')?'en':'ja'; try{localStorage.setItem('ms_lang',lang);}catch(e){} applyLang(); load(); };

/* ===== ライブラリ ===== */
var RELAY=location.origin, toastT;
function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.classList.add('on'); clearTimeout(toastT); toastT=setTimeout(function(){t.classList.remove('on');},1800); }
async function send(file){ var txt=await (await fetch(RELAY+'/'+file,{cache:'no-store'})).text(); await fetch(RELAY+'/push',{method:'POST',body:txt}); return txt; }

async function load(){
  var grid=document.getElementById('grid');
  var list;
  try{ list=await (await fetch(RELAY+'/list',{cache:'no-store'})).json(); }
  catch(e){ grid.innerHTML='<div class="empty">'+tr('noconn')+'</div>'; return; }
  if(!list.length){ grid.innerHTML='<div class="empty">'+tr('empty')+'</div>'; return; }
  grid.innerHTML='';
  for(const it of list){
    var c=document.createElement('div'); c.className='card';
    c.innerHTML='<button class="btn del" title="削除">🗑</button><div class="thumb"></div>'
      +'<div class="meta"><div class="name"></div><div class="file"></div></div>'
      +'<div class="row"><button class="gold send"></button><button class="tune"></button></div>';
    c.querySelector('.name').textContent=it.name;
    c.querySelector('.file').textContent=it.file;
    c.querySelector('.send').textContent=tr('send');
    c.querySelector('.tune').textContent=tr('tunecard');
    var holder=c.querySelector('.thumb');
    c.querySelector('.send').onclick=(function(f){return async function(){ await send(f); toast(tr('sent')); };})(it.file);
    c.querySelector('.tune').onclick=(function(f){return async function(){ await send(f); location.href='/studio.html'; };})(it.file);
    c.querySelector('.del').onclick=(function(f,nm){return async function(ev){ ev.stopPropagation(); if(!confirm('「'+nm+'」'+tr('delconfirm'))) return; try{ await fetch(RELAY+'/delete-lib',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({file:f})}); toast(tr('deleted')); load(); }catch(e){ toast(tr('delfail')); } };})(it.file, it.name);
    grid.appendChild(c);
    // サムネ描画（カードがDOMに入って幅が確定してから）
    try{
      var doc=await (await fetch(RELAY+'/'+it.file,{cache:'no-store'})).json();
      renderThumb(holder, doc);
    }catch(e){ holder.innerHTML='<div class="err">'+tr('pvfail')+'</div>'; }
  }
}
applyLang();
load();
(function(){ var SELF='library', lastV=null;
  setInterval(function(){ fetch('/nav',{cache:'no-store'}).then(function(r){return r.json();}).then(function(d){ if(lastV===null){lastV=d.v;return;} if(d.v!==lastV){ lastV=d.v; if(d.view && d.view!==SELF) location.href='/'+d.view+'.html'; } }).catch(function(){}); }, 1000);
})();
</script>
</body>
</html>
