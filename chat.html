<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mothership — チャット</title>
<style>
  :root{--bg:#1b1b19;--panel:#23231f;--ink:#e8e5de;--faint:#8a8a80;--line:#33332f;--gold:#a89060;--live:#5a9c6a}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);font-family:'SF Mono','Space Mono',ui-monospace,monospace;font-size:13px;display:flex;flex-direction:column;height:100vh}
  header{padding:14px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;flex-shrink:0}
  .logo{font-weight:700;letter-spacing:.26em;font-size:13px}
  .logo svg{vertical-align:-3px;margin-right:8px}
  .logo span{color:var(--gold)}
  .nav{margin-left:auto;display:flex;gap:8px}
  a.btn{font-family:inherit;font-size:11px;letter-spacing:.1em;border-radius:6px;padding:8px 13px;cursor:pointer;
    border:1px solid var(--line);background:var(--panel);color:var(--ink);text-decoration:none;transition:.15s}
  a.btn:hover{border-color:var(--gold);color:#fff}
  a.btn.on{border-color:var(--gold);color:var(--gold)}
  .segnav{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .segnav a{font-family:inherit;font-size:11px;letter-spacing:.04em;color:var(--faint);text-decoration:none;padding:8px 14px;border-right:1px solid var(--line);cursor:pointer;white-space:nowrap;transition:background .15s,color .15s}
  .segnav a:last-child{border-right:none}
  .segnav a:hover{color:var(--ink)}
  .segnav a.on{background:var(--gold);color:#1a1407;font-weight:700}
  .uselamp{display:none;align-items:center;gap:5px;margin-left:14px;font-size:10px;letter-spacing:.1em;color:#e0584f}
  .uselamp.on{display:inline-flex}
  .uselamp i{width:8px;height:8px;border-radius:50%;background:#e0584f;box-shadow:0 0 7px #e0584f;animation:lampblink 1s steps(1,end) infinite}
  @keyframes lampblink{50%{opacity:.12;box-shadow:none}}
  .feed{flex:1;overflow-y:auto;padding:22px;display:flex;flex-direction:column;gap:14px}
  .feed-inner{max-width:780px;margin:0 auto;width:100%;display:flex;flex-direction:column;gap:14px}
  .msg{display:flex;flex-direction:column;gap:5px}
  .msg.me{align-items:flex-end}
  .msg.ms,.msg.think,.msg.err{align-items:flex-start}
  .msg .who{color:var(--faint);font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:0 6px}
  .msg .body{max-width:80%;background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:11px 15px;white-space:pre-wrap;word-break:break-word;line-height:1.7}
  .msg.me .body{background:color-mix(in srgb,var(--gold) 22%,var(--panel));border-color:color-mix(in srgb,var(--gold) 45%,transparent);color:#f2ecdd;border-bottom-right-radius:4px}
  .msg.me .who{color:var(--gold)}
  .msg.ms .body{border-left:3px solid var(--gold);border-bottom-left-radius:4px}
  .msg.think .body{color:var(--gold);border-left:3px solid var(--gold)}
  .msg.err .body{border-color:#a5564e;color:#e6b3ac}
  .spin{display:inline-block;animation:rot 1.1s linear infinite}
  @keyframes rot{to{transform:rotate(360deg)}}
  .loadring{display:inline-block;width:15px;height:15px;border:2px solid var(--line);border-top-color:var(--gold);border-radius:50%;vertical-align:-3px;margin-right:8px;animation:rot .7s linear infinite}
  .secs{color:var(--gold);font-weight:700;font-variant-numeric:tabular-nums}
  .hello{color:var(--faint);text-align:center;line-height:1.8;padding:30px 10px}
  .hello b{color:var(--gold)}
  .ex{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:12px}
  .ex button{font-family:inherit;font-size:11px;border:1px solid var(--line);background:var(--panel);color:var(--ink);
    border-radius:20px;padding:7px 13px;cursor:pointer;transition:.15s}
  .ex button:hover{border-color:var(--gold);color:#fff}
  .composer{flex-shrink:0;border-top:1px solid var(--line);padding:14px 20px;background:var(--bg)}
  .composer-inner{max-width:780px;margin:0 auto;display:flex;gap:10px;align-items:flex-end}
  textarea{flex:1;background:var(--panel);color:var(--ink);border:1px solid var(--line);border-radius:9px;
    font-family:inherit;font-size:13px;line-height:1.5;padding:11px 13px;resize:none;outline:none;max-height:160px;min-height:46px}
  textarea:focus{border-color:var(--gold)}
  .send{font-family:inherit;font-size:12px;letter-spacing:.08em;border-radius:9px;padding:12px 18px;cursor:pointer;
    border:1px solid var(--gold);background:var(--gold);color:#1a1a18;font-weight:700;flex-shrink:0;transition:.15s}
  .send:hover{filter:brightness(1.08)}
  .send:disabled{opacity:.45;cursor:default;filter:none}
  .iconbtn{flex:0 0 auto;font-family:inherit;font-size:16px;border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:9px;padding:11px 13px;cursor:pointer;transition:.15s}
  .iconbtn:hover{border-color:var(--gold)}
  .iconbtn.on{border-color:var(--gold);color:var(--gold)}
  .attachchip{display:none;align-items:center;gap:10px;max-width:780px;margin:0 auto 8px;padding:8px 10px;background:var(--panel);border:1px solid var(--line);border-radius:9px;font-size:11px;color:var(--faint)}
  .attachchip.show{display:flex}
  .attachchip img{width:38px;height:38px;object-fit:cover;border-radius:6px}
  .attachchip .x{margin-left:auto;border:none;background:none;color:var(--faint);cursor:pointer;font-size:13px}
  .feed.dragover{outline:2px dashed var(--gold);outline-offset:-6px}
  .msg .body img{max-width:280px;border-radius:8px;margin-top:6px;display:block}
  .foot{max-width:780px;margin:7px auto 0;color:var(--faint);font-size:9.5px;letter-spacing:.04em}
  .foot code{color:var(--gold)}
</style>
</head>
<body>
  <header>
    <div class="logo"><svg width="22" height="15" viewBox="2 9 46 32" fill="none" stroke="#a89060" stroke-width="4.2" stroke-linecap="round"><path d="M25 25 C25 11 4 11 4 25 C4 39 25 39 25 25 C25 11 46 11 46 25 C46 39 25 39 25 25 Z"/></svg>M O T H E R S H I P<span> · チャット</span><span class="uselamp" id="uselamp"><i></i><b>使用中</b></span></div>
    <div class="nav"><span class="segnav"><a class="on" href="/chat.html">💬 チャット</a><a href="/studio.html">✎ 編集</a><a href="/library.html">▤ ライブラリ</a></span></div>
  </header>

  <div class="feed" id="feed">
    <div class="feed-inner" id="inner">
      <div class="hello" id="hello">
        <div><b>Mothership に話しかける。なんでも。</b></div>
        <div><code style="color:var(--gold)">Claude Code</code> そのもの。相談・質問・調査もOK。デザインを頼めば <b>mothership.json</b> を編集 → 接続中のFigmaにネイティブ生成。</div>
        <div style="font-size:11px;margin-top:6px">（Claude Code Pro / Max のサブスクで動作・API課金なし）</div>
        <div class="ex">
          <button>シンプルな料金表を3プランで作って</button>
          <button>木下スタジオ調のミニマルなKVを作って</button>
          <button>今のデザインの見出しを大きく、余白を広げて</button>
        </div>
      </div>
    </div>
  </div>

  <div class="composer">
    <div class="attachchip" id="attachchip"><img id="attachthumb" alt=""><span id="attachname">画像</span><button class="x" id="attachclear">✕</button></div>
    <div class="composer-inner">
      <button class="iconbtn" id="attachbtn" title="画像を添付（ドラッグでもOK）">📎</button>
      <button class="iconbtn" id="imgbtn" title="画像プロンプト生成モード（MJ/DALL·E用のプロンプトを作る）">🎨</button>
      <textarea id="input" placeholder="Mothershipに話しかける（作る・聞く・相談）Enter / 改行は Shift+Enter" rows="1"></textarea>
      <button class="send" id="send">送信</button>
    </div>
    <input type="file" id="attachinput" accept="image/*" style="display:none">
    <div class="foot">relay <code>/chat</code> → <code>claude -p</code> → <code>mothership.json</code> 編集 → Figma自動更新。プラグインを「接続」しておくとライブ反映。</div>
  </div>

<script>
  var RELAY = location.origin;
  var inner = document.getElementById('inner'), feed = document.getElementById('feed');
  var input = document.getElementById('input'), sendBtn = document.getElementById('send');
  var busy = false, chatLog = [], pendingImg = null;

  function scroll(){ feed.scrollTop = feed.scrollHeight; }
  function bubble(who, cls, text, img){
    var m = document.createElement('div'); m.className = 'msg ' + cls;
    var w = document.createElement('div'); w.className = 'who'; w.textContent = who;
    var b = document.createElement('div'); b.className = 'body'; if(text)b.textContent = text;
    if(img){ var im=document.createElement('img'); im.src=img; b.appendChild(im); }
    m.appendChild(w); m.appendChild(b); inner.appendChild(m); scroll();
    return b;
  }
  var lastChatStr='';
  function labelFor(cls){ return cls==='me'?'あなた':cls==='err'?'エラー':'Mothership'; }
  function saveChat(){ var s=JSON.stringify(chatLog.slice(-60).map(function(e){return {cls:e.cls,text:e.text};})); lastChatStr=s; try{ fetch(RELAY+'/chat-log',{method:'POST',headers:{'Content-Type':'application/json'},body:s}); }catch(e){} }
  function renderChatLog(){ Array.prototype.slice.call(inner.querySelectorAll('.msg')).forEach(function(n){n.remove();}); var h=document.getElementById('hello'); if(h)h.style.display=chatLog.length?'none':''; chatLog.forEach(function(e){ bubble(labelFor(e.cls),e.cls,e.text); }); if(typeof ensureSyncThink==='function')ensureSyncThink(); scroll(); }
  function logBubble(cls, text, img){ chatLog.push({cls:cls,text:text}); saveChat(); var h=document.getElementById('hello'); if(h)h.style.display='none'; return bubble(labelFor(cls),cls,text,img); }

  /* 📎画像添付 / 🎨画像プロンプトモード（パネルと同等） */
  var attachInput=document.getElementById('attachinput'), attachChip=document.getElementById('attachchip'), attachThumb=document.getElementById('attachthumb'), attachName=document.getElementById('attachname'), attachBtn=document.getElementById('attachbtn');
  function setPending(d,name){ pendingImg=d; attachThumb.src=d; attachName.textContent=name||'画像'; attachChip.classList.add('show'); attachBtn.classList.add('on'); }
  function clearPending(){ pendingImg=null; attachChip.classList.remove('show'); attachBtn.classList.remove('on'); attachInput.value=''; }
  function readImg(file){ if(!file||file.type.indexOf('image')!==0)return; var rd=new FileReader(); rd.onload=function(){ setPending(rd.result,file.name); }; rd.readAsDataURL(file); }
  attachBtn.onclick=function(){ attachInput.click(); };
  attachInput.onchange=function(){ if(this.files[0])readImg(this.files[0]); };
  document.getElementById('attachclear').onclick=clearPending;
  ['dragenter','dragover'].forEach(function(ev){ feed.addEventListener(ev,function(e){ e.preventDefault(); feed.classList.add('dragover'); }); });
  feed.addEventListener('dragleave',function(e){ e.preventDefault(); feed.classList.remove('dragover'); });
  feed.addEventListener('drop',function(e){ e.preventDefault(); feed.classList.remove('dragover'); var f=e.dataTransfer&&e.dataTransfer.files[0]; if(f)readImg(f); });
  var imgMode=false, imgBtn=document.getElementById('imgbtn');
  var IMG_PREFIX='【画像プロンプト生成モード】ファイルは一切編集しないこと。現在の mothership.json のデザイン（配色・雰囲気）を読んで踏まえ、下記の要望に合うKV/写真用の画像生成プロンプトを作る。Midjourney用（--ar等のフラグ付き・横長KV比）と DALL·E/Gemini用（文章調・純白背景を明記）の2種を、それぞれコードブロックで返す。説明は最小限。\n\n要望: ';
  var DEFAULT_PH=input.placeholder;
  imgBtn.onclick=function(){ imgMode=!imgMode; imgBtn.classList.toggle('on',imgMode); input.placeholder=imgMode?'🎨 画像生成プロンプトを作る（MJ/DALL·E用）— どんな画像？':DEFAULT_PH; input.focus(); };
  async function loadChatLog(){ try{ var r=await fetch(RELAY+'/chat-log',{cache:'no-store'}); var txt=await r.text(); lastChatStr=txt; var a=JSON.parse(txt); chatLog=Array.isArray(a)?a:[]; }catch(e){ chatLog=[]; lastChatStr=''; } renderChatLog(); }
  async function pollChat(){ if(busy)return; try{ var r=await fetch(RELAY+'/chat-log',{cache:'no-store'}); var txt=await r.text(); if(txt!==lastChatStr){ lastChatStr=txt; var a=JSON.parse(txt); chatLog=Array.isArray(a)?a:[]; renderChatLog(); } }catch(e){} }
  var remoteBusy=false, remoteSince=0, syncThinkMsg=null;
  function ensureSyncThink(){
    var show=remoteBusy && !busy;
    if(show){
      if(!syncThinkMsg){ var bd=bubble('Mothership','think',''); bd.innerHTML='<span class="loadring"></span>考えています…（mothership.json を編集中） <span class="secs">0.0s</span>'; syncThinkMsg=bd.parentElement; }
      if(syncThinkMsg.parentElement!==inner) inner.appendChild(syncThinkMsg);
      var se=syncThinkMsg.querySelector('.secs'); if(se) se.textContent=((Date.now()-remoteSince)/1000).toFixed(1)+'s';
      scroll();
    } else if(syncThinkMsg){ if(syncThinkMsg.parentElement)syncThinkMsg.remove(); syncThinkMsg=null; }
  }
  function setLamp(on){ var l=document.getElementById('uselamp'); if(l)l.classList.toggle('on',!!on); }
  async function pollBusy(){ try{ var b=await (await fetch(RELAY+'/chat-busy',{cache:'no-store'})).json(); remoteBusy=!!b.busy; remoteSince=b.since||0; }catch(e){ remoteBusy=false; } ensureSyncThink(); setLamp(remoteBusy||busy); }

  async function send(){
    if (busy) return;
    var text = input.value.trim();
    if (!text && !pendingImg) return;
    var hello = document.getElementById('hello'); if (hello) hello.remove();
    busy = true; sendBtn.disabled = true; setLamp(true);
    var img = pendingImg; input.value = ''; input.style.height = 'auto';
    var useImg = imgMode; if (imgMode) { imgMode = false; imgBtn.classList.remove('on'); input.placeholder = DEFAULT_PH; }
    var sendMsg = useImg ? (IMG_PREFIX + text) : text;
    clearPending();
    var disp = (useImg ? '🎨 ' : '') + text;
    bubble(labelFor('me'), 'me', disp, img);  // 楽観表示のみ。会話の保存はrelayが行う（別タブに移動しても消えない）
    var t0 = Date.now();
    var thinkBody = bubble('Mothership', 'think', '');
    thinkBody.innerHTML = '<span class="loadring"></span>'+(useImg?'🎨 プロンプトを作成中…':'考えています…（mothership.json を編集中）')+' <span class="secs">0.0s</span>';
    var secsEl = thinkBody.querySelector('.secs');  // リングは固定、秒数だけ更新
    function tick(){ secsEl.textContent=((Date.now()-t0)/1000).toFixed(1)+'s'; }
    var ti=setInterval(tick,100);
    try{
      var r = await fetch(RELAY + '/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ message: sendMsg, image: img||'', display: disp }) });
      var data = await r.json();
      clearInterval(ti); thinkBody.parentElement.remove();
      var secs=((Date.now()-t0)/1000).toFixed(1);
      if (data.ok){
        bubble(labelFor('ms'), 'ms', (data.text || '（完了）') + '  ·  ⏱'+secs+'s');  // 楽観表示。直後のpollでrelay保存版に同期
      } else {
        bubble(labelFor('err'), 'err', (data.error || '失敗') + (data.text ? '\n\n' + data.text : ''));
      }
    }catch(e){
      clearInterval(ti); thinkBody.parentElement.remove();
      bubble(labelFor('err'), 'err', 'relayに接続できません。cd mothership && node relay.js で起動してください。\n' + (e.message||e));
    }
    busy = false; sendBtn.disabled = false; input.focus();
    scroll(); pollChat();  // relay保存版に即同期（楽観表示を正本へ置換）
  }

  sendBtn.onclick = send;
  input.addEventListener('keydown', function(e){ if (e.key === 'Enter' && !e.shiftKey && !e.isComposing && e.keyCode !== 229){ e.preventDefault(); send(); } });
  input.addEventListener('input', function(){ this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,160)+'px'; });
  document.querySelectorAll('.ex button').forEach(function(b){ b.onclick = function(){ input.value = b.textContent; send(); }; });
  loadChatLog();
  setInterval(pollChat, 1500);  // パネル↔大きい画面の双方向同期
  setInterval(pollBusy, 700);   // 生成中「考えています」も両画面で同期
  (function(){ var SELF='chat', lastV=null;
    setInterval(function(){ fetch('/nav',{cache:'no-store'}).then(function(r){return r.json();}).then(function(d){ if(lastV===null){lastV=d.v;return;} if(d.v!==lastV){ lastV=d.v; if(d.view && d.view!==SELF) location.href='/'+d.view+'.html'; } }).catch(function(){}); }, 1000);
  })();
  input.focus();
</script>
</body>
</html>
